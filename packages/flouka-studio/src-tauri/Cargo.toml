[package]
name = "flouka-studio"
version = "0.1.0"
description = "Flouka Studio - Hammidu Resume Desktop App"
authors = ["Salim Mahboubi"]
edition = "2021"

[lib]
name = "flouka_studio_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "flouka-studio"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
